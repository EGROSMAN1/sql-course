<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>קוויז למתחילים — SQL</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060a0f;--bg2:#0d1420;--bg3:#111927;--bg4:#1a2535;
  --border:#1e2d42;--border2:#2a3f5a;
  --text:#e8f0fe;--text2:#8ba3c7;--text3:#4a6080;
  --blue:#4a9eff;--blue2:#1a6fd4;
  --cyan:#00d4ff;--green:#00e676;--green2:#00a854;
  --orange:#ff8c42;--yellow:#ffd166;--red:#ff4757;
  --teal:#00d4aa;
  --font:'Heebo',sans-serif;--mono:'IBM Plex Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.6}
.topnav{background:rgba(6,10,15,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.back-btn{color:var(--cyan);text-decoration:none;font-size:13px;font-weight:700;font-family:var(--mono)}
.topnav-title{font-size:14px;font-weight:700;color:var(--text2)}
.topnav-links{margin-right:auto;display:flex;gap:1rem;flex-wrap:wrap}
.topnav-link{color:var(--text3);text-decoration:none;font-size:13px;font-weight:600;transition:color .2s}
.topnav-link:hover{color:var(--cyan)}

/* HERO */
.hero{background:linear-gradient(135deg,var(--bg2),var(--bg3));border-bottom:1px solid var(--border);padding:2.5rem 2rem;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 50% 50%,rgba(0,212,170,.05) 0%,transparent 70%);pointer-events:none}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(0,212,170,.1);border:1px solid rgba(0,212,170,.25);color:var(--teal);font-size:12px;font-weight:700;padding:5px 14px;border-radius:20px;margin-bottom:1rem;letter-spacing:.5px}
.hero-title{font-size:2rem;font-weight:900;margin-bottom:.5rem}
.hero-sub{color:var(--text2);font-size:14px;margin-bottom:1.5rem}
.hero-stats{display:flex;gap:2rem;justify-content:center;flex-wrap:wrap}
.hero-stat{text-align:center}
.hero-stat-num{font-size:1.8rem;font-weight:900;color:var(--teal);font-family:var(--mono)}
.hero-stat-label{font-size:12px;color:var(--text3)}

/* SCORE BAR */
.score-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;position:sticky;top:49px;z-index:90}
.score-info{font-size:13px;color:var(--text2)}
.score-info strong{color:var(--text);font-size:15px}
.score-track{flex:1;min-width:150px;background:var(--bg3);border-radius:4px;height:8px;overflow:hidden}
.score-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--green));border-radius:4px;transition:width .4s}
.score-pct{font-family:var(--mono);font-size:13px;color:var(--teal);font-weight:700;white-space:nowrap}
.reset-btn{background:transparent;border:1px solid var(--border2);color:var(--text3);font-family:var(--font);font-size:12px;padding:5px 12px;border-radius:6px;cursor:pointer;transition:all .15s}
.reset-btn:hover{border-color:var(--red);color:var(--red)}

/* MAIN */
.main{max-width:860px;margin:0 auto;padding:2rem 1.5rem 5rem}

/* SECTION LABEL */
.sec-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin:2rem 0 1rem;display:flex;align-items:center;gap:8px;color:var(--teal)}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* QUESTION CARD */
.q-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;margin-bottom:1.25rem;overflow:hidden;transition:border-color .2s}
.q-card.correct{border-color:var(--green2)}
.q-card.wrong{border-color:var(--red)}
.q-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border)}
.q-meta{display:flex;align-items:center;gap:.75rem;margin-bottom:.5rem;flex-wrap:wrap}
.q-num{background:var(--bg4);color:var(--text3);font-family:var(--mono);font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.q-section{font-size:10px;color:var(--teal);font-family:var(--mono);background:rgba(0,212,170,.08);border:1px solid rgba(0,212,170,.2);padding:2px 8px;border-radius:10px}
.q-text{font-size:14px;font-weight:600;color:var(--text);line-height:1.6}
.q-body{padding:1rem 1.25rem}

/* OPTIONS */
.options{display:flex;flex-direction:column;gap:.6rem}
.option{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:.75rem;text-align:right}
.option:hover:not(.disabled){background:var(--bg4);border-color:var(--border2)}
.option.disabled{cursor:default;pointer-events:none}
.option.correct-ans{border-color:var(--green2)!important;background:rgba(0,168,84,.08)!important}
.option.wrong-ans{border-color:var(--red)!important;background:rgba(255,71,87,.08)!important}
.opt-letter{width:26px;height:26px;border-radius:6px;background:var(--bg4);border:1px solid var(--border2);color:var(--text3);font-size:12px;font-weight:700;font-family:var(--mono);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.option.correct-ans .opt-letter{background:var(--green2);color:#fff;border-color:var(--green2)}
.option.wrong-ans .opt-letter{background:var(--red);color:#fff;border-color:var(--red)}
.opt-text{font-size:13px;color:var(--text2);line-height:1.5;flex:1;font-family:var(--mono)}
.option.correct-ans .opt-text,.option.wrong-ans .opt-text{color:var(--text)}

/* EXPLANATION */
.explanation{display:none;margin-top:.75rem;border-radius:8px;padding:.85rem 1rem;background:rgba(0,212,170,.04);border:1px solid rgba(0,212,170,.15);border-right:3px solid var(--teal)}
.explanation.show{display:block}
.exp-label{font-size:11px;font-weight:700;color:var(--teal);letter-spacing:.5px;margin-bottom:.3rem;font-family:var(--mono)}
.exp-text{font-size:13.5px;color:var(--text2);line-height:1.7}
.exp-text strong{color:var(--text)}

/* FINISH */
.finish-card{background:linear-gradient(135deg,rgba(0,212,170,.08),rgba(0,230,118,.05));border:1px solid rgba(0,212,170,.2);border-radius:16px;padding:2.5rem;text-align:center;margin-top:2rem;display:none}
.finish-card.show{display:block}
.finish-emoji{font-size:3rem;margin-bottom:.75rem}
.finish-title{font-size:1.6rem;font-weight:900;color:var(--teal);margin-bottom:.5rem}
.finish-score{font-size:3rem;font-weight:900;font-family:var(--mono);margin:.75rem 0}
.finish-grade{display:inline-block;font-size:1rem;font-weight:700;padding:.4rem 1.2rem;border-radius:20px;margin:.75rem 0}
.grade-a{background:rgba(0,230,118,.15);color:var(--green);border:1px solid rgba(0,230,118,.3)}
.grade-b{background:rgba(74,158,255,.15);color:var(--blue);border:1px solid rgba(74,158,255,.3)}
.grade-c{background:rgba(255,140,66,.15);color:var(--orange);border:1px solid rgba(255,140,66,.3)}
.grade-d{background:rgba(255,71,87,.15);color:var(--red);border:1px solid rgba(255,71,87,.3)}
.finish-sub{color:var(--text2);font-size:14px;line-height:1.7}
.retry-btn{background:var(--teal);color:#000;border:none;padding:12px 28px;border-radius:10px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;margin-top:1rem;transition:all .2s}
.retry-btn:hover{opacity:.85;transform:translateY(-1px)}
.adv-link{display:inline-flex;align-items:center;gap:6px;margin-top:.75rem;margin-right:1rem;color:var(--blue);text-decoration:none;font-size:13px;font-weight:700}

/* HAMBURGER */
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;background:none;border:none;z-index:200}
.hamburger span{display:block;width:24px;height:2px;background:var(--text);border-radius:2px;transition:all .3s}
.hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}
.mobile-menu{display:none;position:fixed;inset:0;top:49px;background:rgba(6,10,15,.98);z-index:150;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem}
.mobile-menu.open{display:flex}
.mobile-menu a{color:var(--text);text-decoration:none;font-size:1.3rem;font-weight:700;padding:.5rem 2rem;border-radius:10px}

@media(max-width:768px){
.hero{padding:2rem .75rem 1.5rem}
.hero-title{font-size:1.5rem}
.hero-sub{font-size:13px}
.hero-stats{gap:.75rem;flex-wrap:wrap}
.hero-stat-num{font-size:1.5rem}
.quiz-container{padding:.75rem}
.question-card{padding:1rem}
.q-text{font-size:14px}
.options{gap:.5rem}
.option-btn{font-size:13px;padding:.7rem .85rem;text-align:right}
.explain-box{font-size:13px;padding:.65rem .85rem}
.nav-links,.nav-cta{display:none}
.finish-card{padding:2rem 1rem}
.finish-score{font-size:2.5rem}
.hamburger{display:flex}
.topnav-links{display:none}
.main{padding:1rem .75rem 4rem}
.opt-text{font-size:11px}
.score-track{min-width:80px}
}

@media(max-width:768px){
  /* Better touch targets */
  a, button{min-height:40px;display:inline-flex;align-items:center}
  /* Prevent horizontal scroll */
  body{overflow-x:hidden;-webkit-text-size-adjust:100%}
  /* Better table display on mobile */
  table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
  /* Code blocks */
  pre,code{font-size:11px;overflow-x:auto;-webkit-overflow-scrolling:touch;max-width:100%;white-space:pre-wrap;word-break:break-word}
  /* Images responsive */
  img{max-width:100%;height:auto}
}
@media(max-width:480px){
  body{font-size:14px}
  h1{font-size:1.5rem!important}
  h2{font-size:1.2rem!important}
}
</style>
</head>
<body>

<div class="topnav">
  <a href="index.html" class="back-btn">← דף הבית</a>

    <a href="practice.html" class="topnav-link">✏️ תרגולים</a>
  </div>
  <button class="hamburger" id="hamburger" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </button>
</div>
<div class="mobile-menu" id="mobileMenu">
  <a href="index.html">🏠 דף הבית</a>
  <a href="quiz.html">🧠 קוויז מתקדם</a>
  <a href="course.html">📚 חומר לימוד</a>
  <a href="practice.html">✏️ תרגולים</a>
</div>

<div class="hero">
  <div class="hero-badge">🌱 מתחילים · SELECT בסיסי</div>
  <h1 class="hero-title">קוויז למתחילים — SQL</h1>
  <p class="hero-sub">150 שאלות על SELECT, WHERE, GROUP BY, JOIN ו-Subqueries — עם הסבר מפורט לכל תשובה</p>
  <div class="hero-stats">
    <div class="hero-stat"><div class="hero-stat-num">150</div><div class="hero-stat-label">שאלות</div></div>
    <div class="hero-stat"><div class="hero-stat-num">6</div><div class="hero-stat-label">נושאים</div></div>
    <div class="hero-stat"><div class="hero-stat-num" id="heroAnswered">0</div><div class="hero-stat-label">נענו</div></div>
  </div>
</div>

<div class="score-bar">
  <div class="score-info">ניקוד: <strong id="scoreText">0 / 0</strong></div>
  <div class="score-track"><div class="score-fill" id="scoreFill" style="width:0%"></div></div>
  <div class="score-pct" id="scorePct">0%</div>
  <button class="reset-btn" onclick="resetQuiz()">🔄 התחל מחדש</button>
</div>

<div class="main" id="mainContent"></div>

<script>
const questions = [
  // חלק א': יסודות SELECT
  {num:1, section:"חלק א׳ — יסודות SELECT", text:"מהו התפקיד העיקרי של פקודת SELECT?",
   options:["למחוק נתונים מהטבלה.","לעדכן נתונים קיימים.","לשלוף ולהציג נתונים מהדאטה בייס.","ליצור טבלה חדשה."],
   correct:2, explain:"SELECT היא פקודת ה-\"קריאה\" (Read) שמשמשת אותנו <strong>לצפות במידע</strong> שקיים בטבלאות. היא לא משנה ולא מוחקת — רק מציגה."},

  {num:2, section:"חלק א׳ — יסודות SELECT", text:"באיזה סימן נשתמש כדי לשלוף את כל העמודות מטבלה מסוימת?",
   options:["#","&","* (כוכבית)","%"],
   correct:2, explain:"הכוכבית היא קיצור ל-\"הכל\" (All). <code>SELECT *</code> שולף את כל העמודות בלי לכתוב אותן אחת אחת."},

  {num:3, section:"חלק א׳ — יסודות SELECT", text:"איזו מילת מפתח מציינת את שם הטבלה שממנה נרצה לשלוף את המידע?",
   options:["WHERE","FROM","TABLE","IN"],
   correct:1, explain:"המבנה הבסיסי הוא: <code>SELECT</code> (מה להביא) ואז <code>FROM</code> (מאיפה להביא). FROM = מאיפה."},

  {num:4, section:"חלק א׳ — יסודות SELECT", text:"איך מפרידים בין שמות של מספר עמודות בשאילתה אחת?",
   options:["נקודה (.)","פסיק (,)","מקף (-)","רווח בלבד."],
   correct:1, explain:"כדי לשלוף כמה עמודות ספציפיות נרשום אותן עם <strong>פסיק</strong> ביניהן: <code>SELECT name, city, phone</code>"},

  {num:5, section:"חלק א׳ — יסודות SELECT", text:"מה משמעות המילה AS בשאילתת SELECT?",
   options:["לסנן נתונים.","לתת כינוי (Alias) לעמודה בתוצאות.","למיין את הנתונים בסדר עולה.","לחבר שתי טבלאות."],
   correct:1, explain:"<strong>AS</strong> מאפשר לשנות את השם שמוצג בראש העמודה בדוח הסופי, בלי לשנות את השם האמיתי בטבלה. למשל: <code>SELECT price AS מחיר</code>"},

  // חלק ב': מילים שמורות וסינטקס
  {num:6, section:"חלק ב׳ — מילים שמורות וסינטקס", text:"כיצד נשלוף רק ערכים ייחודיים (ללא כפילויות) מעמודה מסוימת?",
   options:["SELECT UNIQUE","SELECT DIFFERENT","SELECT DISTINCT","SELECT ONLY"],
   correct:2, explain:"<strong>DISTINCT</strong> מסננת שורות כפולות ומציגה כל ערך פעם אחת בלבד. <code>SELECT DISTINCT city FROM customers</code>"},

  {num:7, section:"חלק ב׳ — מילים שמורות וסינטקס", text:"היכן ממוקם בדרך כלל סימן הנקודה-פסיק (;) בשאילתה?",
   options:["בתחילת השאילתה.","בין ה-SELECT ל-FROM.","בסוף השאילתה כולה.","אחרי כל שם של עמודה."],
   correct:2, explain:"הנקודה-פסיק <strong>מסמנת את סוף הפקודה</strong> ואומרת למנוע ה-SQL שניתן להריץ אותה."},

  {num:8, section:"חלק ב׳ — מילים שמורות וסינטקס", text:"האם המילים SELECT ו-FROM חייבות להיכתב באותיות גדולות?",
   options:["כן, אחרת השאילתה לא תעבוד.","לא, SQL אינה רגישה לאותיות גדולות/קטנות במילים השמורות שלה.","רק המילה SELECT חייבת להיות גדולה.","תלוי רק בגרסת ה-MySQL."],
   correct:1, explain:"SQL <strong>אינה Case-Sensitive</strong> למילות מפתח. <code>select * from customers</code> עובד בדיוק כמו <code>SELECT * FROM customers</code>. הכתיבה באותיות גדולות היא מוסכמה לקריאות."},

  {num:9, section:"חלק ב׳ — מילים שמורות וסינטקס", text:"מה יקרה אם נכתוב SELECT 5 + 5?",
   options:["שגיאה, כי אין פקודת FROM.","המערכת תחזיר תוצאה של 10.","המערכת תדפיס את הטקסט '5 + 5'.","המערכת תמחק את הטבלה."],
   correct:1, explain:"<strong>SELECT יכול לשמש כמחשבון!</strong> אם לא פונים לטבלה, הוא מחשב את הביטוי ומחזיר את התוצאה — במקרה זה 10."},

  {num:10, section:"חלק ב׳ — מילים שמורות וסינטקס", text:"כיצד נכתוב הערה (Comment) של שורה אחת ב-SQL?",
   options:["//","#","-- (שני מקפים)","גם ב' וגם ג' נכונים (תלוי בסוג הדאטה בייס)."],
   correct:3, explain:"ברוב המערכות: <code>-- הערה</code> עובד תמיד. ב-MySQL אפשר גם <code># הערה</code>. המנוע מתעלם מהטקסט אחרי הסימן."},

  // חלק ג': עמודות וחישובים
  {num:11, section:"חלק ג׳ — עבודה עם עמודות וחישובים", text:"מה תציג השאילתה: SELECT 'Hello World';?",
   options:["שגיאה, חסר שם טבלה.","רשימה של כל הלקוחות בעולם.","שורה אחת עם הטקסט Hello World.","את כל הטבלאות בדאטה בייס."],
   correct:2, explain:"שימוש ב<strong>גרשיים ב-SELECT</strong> מציג מחרוזת טקסט קבועה — שורה אחת עם הערך שכתבנו."},

  {num:12, section:"חלק ג׳ — עבודה עם עמודות וחישובים", text:"איך ניתן לבצע חישוב של עמודת מחיר כפול 2?",
   options:["SELECT price * 2 FROM products","SELECT price X 2 FROM products","SELECT MULTIPLY(price, 2) FROM products","SELECT price ^ 2 FROM products"],
   correct:0, explain:"ב-SQL משתמשים באופרטורים מתמטיים רגילים: <code>*</code> למכפלה, <code>/</code> לחילוק, <code>+</code> לחיבור, <code>-</code> לחיסור."},

  {num:13, section:"חלק ג׳ — עבודה עם עמודות וחישובים", text:"אם נרצה לתת כינוי לעמודה שכולל רווח (למשל: My Price), איך נכתוב זאת?",
   options:["AS My Price","AS 'My Price' (בתוך גרשיים)","AS My_Price","תשובות ב' ו-ג' נכונות."],
   correct:3, explain:"אם יש <strong>רווח בשם</strong> — חייבים גרשיים: <code>AS 'My Price'</code>. אם משתמשים בקו תחתי אין צורך: <code>AS My_Price</code>. שניהם תקינים."},

  {num:14, section:"חלק ג׳ — עבודה עם עמודות וחישובים", text:"מה ההבדל בין SELECT * לבין SELECT עמודה ספציפית?",
   options:["אין הבדל בביצועים.","SELECT * תמיד מהיר יותר.","SELECT עמודה ספציפית חוסך במשאבים ומציג רק מה שצריך.","SELECT * עובד רק ב-MySQL."],
   correct:2, explain:"תמיד <strong>עדיף לשלוף רק את העמודות שצריך</strong>. SELECT * טוען הכל לזיכרון — גם עמודות שלא נזדקק להן — מה שמאט את השאילתה."},

  {num:15, section:"חלק ג׳ — עבודה עם עמודות וחישובים", text:"איזו שאילתה תחזיר את כל הנתונים מטבלת Employees?",

let answers = {};
let correct = 0;
let currentSection = null;

function updateScore(){
  const total = Object.keys(answers).length;
  const pct = total > 0 ? Math.round(correct/total*100) : 0;
  document.getElementById('scoreText').textContent = correct+' / '+total;
  document.getElementById('scoreFill').style.width = pct+'%';
  document.getElementById('scorePct').textContent = pct+'%';
  document.getElementById('heroAnswered').textContent = total;
  if(total === questions.length) showFinish();
}

function selectOption(qIdx, optIdx){
  if(answers[qIdx] !== undefined) return;
  const q = questions[qIdx];
  const isCorrect = optIdx === q.correct;
  answers[qIdx] = optIdx;
  if(isCorrect) correct++;
  const card = document.getElementById('qcard-'+qIdx);
  card.classList.add(isCorrect ? 'correct' : 'wrong');
  card.querySelectorAll('.option').forEach((o,i)=>{
    o.classList.add('disabled');
    if(i === q.correct) o.classList.add('correct-ans');
    if(i === optIdx && !isCorrect) o.classList.add('wrong-ans');
  });
  const exp = document.getElementById('exp-'+qIdx);
  exp.querySelector('.exp-text').innerHTML = (isCorrect ? '✅ נכון! ' : '❌ לא נכון. ') + q.explain;
  exp.classList.add('show');
  updateScore();
}

function buildQuiz(){
  const mc = document.getElementById('mainContent');
  mc.innerHTML = '';
  const letters = ['א','ב','ג','ד'];
  questions.forEach((q,i)=>{
    if(q.section !== currentSection){
      currentSection = q.section;
      mc.innerHTML += `<div class="sec-label">${q.section}</div>`;
    }
    const opts = q.options.map((o,oi)=>`
      <div class="option" onclick="selectOption(${i},${oi})">
        <div class="opt-letter">${letters[oi]}</div>
        <div class="opt-text">${o}</div>
      </div>`).join('');
    mc.innerHTML += `
    <div class="q-card" id="qcard-${i}">
      <div class="q-header">
        <div class="q-meta">
          <div class="q-num">שאלה ${q.num}</div>
          <div class="q-section">${q.section.split('—')[1]?.trim() || q.section}</div>
        </div>
        <div class="q-text">${q.text}</div>
      </div>
      <div class="q-body">
        <div class="options">${opts}</div>
        <div class="explanation" id="exp-${i}">
          <div class="exp-label">💡 הסבר</div>
          <div class="exp-text"></div>
        </div>
      </div>
    </div>`;
  });
  mc.innerHTML += `
  <div class="finish-card" id="finishCard">
    <div class="finish-emoji">🎉</div>
    <div class="finish-title">סיימת את הקוויז!</div>
    <div class="finish-score" id="finishScore">0/150</div>
    <div id="finishGrade"></div>
    <div class="finish-sub" id="finishSub"></div>
    <br>
    <button class="retry-btn" onclick="resetQuiz()">🔄 נסה שוב</button>
    <a href="quiz.html" class="adv-link">🧠 מוכן לקוויז המתקדם? ←</a>
  </div>`;
}

function showFinish(){
  const card = document.getElementById('finishCard');
  card.classList.add('show');
  card.scrollIntoView({behavior:'smooth',block:'center'});
  document.getElementById('finishScore').textContent = correct+'/150';
  const pct = Math.round(correct/150*100);
  let grade, sub;
  if(pct>=90){grade='<span class="finish-grade grade-a">⭐ מצוין! A</span>';sub='כל הכבוד! שלטת ביסודות SELECT ברמה גבוהה. אתה מוכן לנושאים הבאים!';}
  else if(pct>=75){grade='<span class="finish-grade grade-b">👍 טוב מאוד! B</span>';sub='עבודה טובה! כדאי לחזור על השאלות שטעית בהן ואז להמשיך קדימה.';}
  else if(pct>=60){grade='<span class="finish-grade grade-c">📚 עובר! C</span>';sub='בסיס טוב, אבל כדאי לחזור על חומר ה-SELECT לפני שממשיכים.';}
  else{grade='<span class="finish-grade grade-d">💪 ממשיכים להתאמן! D</span>';sub='אל תתייאש — חזור לחומר הלימוד על SELECT ונסה שוב!';}
  document.getElementById('finishGrade').innerHTML = grade;
  document.getElementById('finishSub').textContent = sub;
}

function resetQuiz(){
  answers = {}; correct = 0; currentSection = null;
  buildQuiz();
  updateScore();
  window.scrollTo({top:0,behavior:'smooth'});
}

function toggleMenu(){
  document.getElementById('hamburger').classList.toggle('open');
  document.getElementById('mobileMenu').classList.toggle('open');
}

buildQuiz();
updateScore();
</script>
</body>
