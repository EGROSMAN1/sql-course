<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בחן את עצמך — SQL Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060a0f;--bg2:#0d1420;--bg3:#111927;--bg4:#1a2535;
  --border:#1e2d42;--border2:#2a3f5a;
  --text:#e8f0fe;--text2:#8ba3c7;--text3:#4a6080;
  --blue:#4a9eff;--blue2:#1a6fd4;--blue3:#0a3a6e;
  --cyan:#00d4ff;--green:#00e676;--green2:#00a854;
  --orange:#ff8c42;--yellow:#ffd166;--red:#ff4757;
  --purple:#d2a8ff;
  --font:'Heebo',sans-serif;--mono:'IBM Plex Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.6;min-height:100vh}
.topnav{background:rgba(6,10,15,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.back-btn{color:var(--cyan);text-decoration:none;font-size:13px;font-weight:700;font-family:var(--mono)}
.topnav-title{font-size:14px;font-weight:700;color:var(--text2)}
.topnav-links{margin-right:auto;display:flex;gap:1rem;flex-wrap:wrap}
.topnav-link{color:var(--text3);text-decoration:none;font-size:13px;font-weight:600;transition:color .2s}
.topnav-link:hover{color:var(--cyan)}

/* HERO */
.hero{background:linear-gradient(135deg,var(--bg2),var(--bg3));border-bottom:1px solid var(--border);padding:2.5rem 2rem;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 50% 50%,rgba(188,140,255,.05) 0%,transparent 70%);pointer-events:none}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(188,140,255,.1);border:1px solid rgba(188,140,255,.25);color:var(--purple);font-size:12px;font-weight:700;padding:5px 14px;border-radius:20px;margin-bottom:1rem;letter-spacing:.5px}
.hero-title{font-size:2rem;font-weight:900;margin-bottom:.5rem}
.hero-sub{color:var(--text2);font-size:14px;margin-bottom:1.5rem}
.hero-stats{display:flex;gap:2rem;justify-content:center;flex-wrap:wrap}
.hero-stat{text-align:center}
.hero-stat-num{font-size:1.8rem;font-weight:900;color:var(--purple);font-family:var(--mono)}
.hero-stat-label{font-size:12px;color:var(--text3)}

/* SCORE BAR */
.score-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;position:sticky;top:49px;z-index:90}
.score-info{font-size:13px;color:var(--text2)}
.score-info strong{color:var(--text);font-size:15px}
.score-track{flex:1;min-width:150px;background:var(--bg3);border-radius:4px;height:8px;overflow:hidden}
.score-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--blue));border-radius:4px;transition:width .4s}
.score-pct{font-family:var(--mono);font-size:13px;color:var(--purple);font-weight:700;white-space:nowrap}
.reset-btn{background:transparent;border:1px solid var(--border2);color:var(--text3);font-family:var(--font);font-size:12px;padding:5px 12px;border-radius:6px;cursor:pointer;transition:all .15s}
.reset-btn:hover{border-color:var(--red);color:var(--red)}

/* MAIN */
.main{max-width:860px;margin:0 auto;padding:2rem 1.5rem 5rem}

/* SECTION LABEL */
.section-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin:2rem 0 1rem;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.section-label.easy{color:var(--green)}
.section-label.medium{color:var(--orange)}
.section-label.hard{color:var(--red)}

/* QUESTION CARD */
.q-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;margin-bottom:1.25rem;overflow:hidden;transition:border-color .2s}
.q-card.correct{border-color:var(--green2)}
.q-card.wrong{border-color:var(--red)}
.q-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border)}
.q-meta{display:flex;align-items:center;gap:.75rem;margin-bottom:.5rem}
.q-num{background:var(--bg4);color:var(--text3);font-family:var(--mono);font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.q-diff{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.diff-easy{background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.25)}
.diff-medium{background:rgba(255,140,66,.1);color:var(--orange);border:1px solid rgba(255,140,66,.25)}
.diff-hard{background:rgba(255,71,87,.1);color:var(--red);border:1px solid rgba(255,71,87,.25)}
.q-topic{font-size:10px;color:var(--text3);font-family:var(--mono)}
.q-text{font-size:14px;font-weight:600;color:var(--text);line-height:1.6}
.q-body{padding:1rem 1.25rem}

/* OPTIONS */
.options{display:flex;flex-direction:column;gap:.6rem}
.option{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:.75rem;text-align:right}
.option:hover:not(.disabled){background:var(--bg4);border-color:var(--border2)}
.option.selected{border-color:var(--blue);background:rgba(74,158,255,.06)}
.option.correct-ans{border-color:var(--green2)!important;background:rgba(0,168,84,.08)!important}
.option.wrong-ans{border-color:var(--red)!important;background:rgba(255,71,87,.08)!important}
.option.disabled{cursor:default;pointer-events:none}
.opt-letter{width:26px;height:26px;border-radius:6px;background:var(--bg4);border:1px solid var(--border2);color:var(--text3);font-size:12px;font-weight:700;font-family:var(--mono);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.option.correct-ans .opt-letter{background:var(--green2);color:#fff;border-color:var(--green2)}
.option.wrong-ans .opt-letter{background:var(--red);color:#fff;border-color:var(--red)}
.option.selected .opt-letter{background:var(--blue2);color:#fff;border-color:var(--blue)}
.opt-text{font-size:13px;color:var(--text2);line-height:1.5;flex:1;font-family:var(--mono)}
.option.correct-ans .opt-text,.option.wrong-ans .opt-text{color:var(--text)}

/* EXPLANATION */
.explanation{display:none;margin-top:.75rem;background:rgba(74,158,255,.04);border-right:3px solid var(--blue2);border-radius:0 6px 6px 0;padding:.75rem 1rem}
.explanation.show{display:block}
.explanation p{font-size:13px;color:var(--text2);line-height:1.7}
.explanation strong{color:var(--text);font-weight:600}
.result-icon{font-size:1.1rem;margin-left:.4rem}

/* FINISH */
.finish-card{background:linear-gradient(135deg,rgba(188,140,255,.08),rgba(74,158,255,.05));border:1px solid rgba(188,140,255,.2);border-radius:16px;padding:2.5rem;text-align:center;margin-top:2rem;display:none}
.finish-card.show{display:block}
.finish-emoji{font-size:3rem;margin-bottom:.75rem}
.finish-title{font-size:1.6rem;font-weight:900;color:var(--purple);margin-bottom:.5rem}
.finish-score{font-size:3rem;font-weight:900;font-family:var(--mono);margin:.75rem 0}
.finish-sub{color:var(--text2);font-size:14px}
.finish-grade{display:inline-block;font-size:1rem;font-weight:700;padding:.4rem 1.2rem;border-radius:20px;margin:.75rem 0}
.grade-a{background:rgba(0,230,118,.15);color:var(--green);border:1px solid rgba(0,230,118,.3)}
.grade-b{background:rgba(74,158,255,.15);color:var(--blue);border:1px solid rgba(74,158,255,.3)}
.grade-c{background:rgba(255,140,66,.15);color:var(--orange);border:1px solid rgba(255,140,66,.3)}
.grade-d{background:rgba(255,71,87,.15);color:var(--red);border:1px solid rgba(255,71,87,.3)}
.retry-btn{background:var(--blue2);color:#fff;border:none;padding:12px 28px;border-radius:10px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;margin-top:1rem;transition:all .2s}
.retry-btn:hover{background:var(--blue);transform:translateY(-1px)}

/* HAMBURGER */
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;background:none;border:none;z-index:200}
.hamburger span{display:block;width:24px;height:2px;background:var(--text);border-radius:2px;transition:all .3s}
.hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}
.mobile-menu{display:none;position:fixed;inset:0;top:49px;background:rgba(6,10,15,.98);z-index:150;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem}
.mobile-menu.open{display:flex}
.mobile-menu a{color:var(--text);text-decoration:none;font-size:1.3rem;font-weight:700;padding:.5rem 2rem;border-radius:10px}

@media(max-width:768px){
.hero{padding:2rem .75rem 1.5rem}
.hero-title{font-size:1.5rem}
.hero-sub{font-size:13px}
.hero-stats{gap:.75rem;flex-wrap:wrap}
.hero-stat-num{font-size:1.5rem}
.quiz-container{padding:.75rem}
.question-card{padding:1rem}
.q-text{font-size:14px}
.options{gap:.5rem}
.option-btn{font-size:13px;padding:.7rem .85rem;text-align:right}
.explain-box{font-size:13px;padding:.65rem .85rem}
.nav-links,.nav-cta{display:none}
.finish-card{padding:2rem 1rem}
.finish-score{font-size:2.5rem}
.hamburger{display:flex}
.topnav-links{display:none}
.main{padding:1rem .75rem 4rem}
.opt-text{font-size:11px}
.score-bar{gap:.75rem}
.score-track{min-width:80px}
}

@media(max-width:768px){
  /* Better touch targets */
  a, button{min-height:40px;display:inline-flex;align-items:center}
  /* Prevent horizontal scroll */
  body{overflow-x:hidden;-webkit-text-size-adjust:100%}
  /* Better table display on mobile */
  table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
  /* Code blocks */
  pre,code{font-size:11px;overflow-x:auto;-webkit-overflow-scrolling:touch;max-width:100%;white-space:pre-wrap;word-break:break-word}
  /* Images responsive */
  img{max-width:100%;height:auto}
}
@media(max-width:480px){
  body{font-size:14px}
  h1{font-size:1.5rem!important}
  h2{font-size:1.2rem!important}
}
</style>
</head>

</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-badge">🧠 Sakila + SQL Server · 33 שאלות</div>
  <h1 class="hero-title">בחן את עצמך — SQL Quiz</h1>
  <p class="hero-sub">שאלות אמריקאיות על CASE WHEN, Subqueries, JOIN ו-Window Functions</p>
  <div class="hero-stats">
    <div class="hero-stat"><div class="hero-stat-num">33</div><div class="hero-stat-label">שאלות</div></div>
    <div class="hero-stat"><div class="hero-stat-num">3</div><div class="hero-stat-label">רמות קושי</div></div>
    <div class="hero-stat"><div class="hero-stat-num" id="heroAnswered">0</div><div class="hero-stat-label">נענו</div></div>
  </div>
</div>

<!-- SCORE BAR -->
<div class="score-bar">
  <div class="score-info">ניקוד: <strong id="scoreText">0 / 0</strong></div>
  <div class="score-track"><div class="score-fill" id="scoreFill" style="width:0%"></div></div>
  <div class="score-pct" id="scorePct">0%</div>
  <button class="reset-btn" onclick="resetQuiz()">🔄 התחל מחדש</button>
</div>

<div class="main" id="mainContent"></div>

<script>
const questions = [
  {
    num:1, diff:'easy', topic:'CASE WHEN + JOIN',
    text:'איזו שאילתה תציג את שם הסרט, שמו המלא של השפה וסיווג אורך (Long/Medium/Short)?',
    options:[
      "SELECT f.title, l.name, CASE WHEN f.length > 120 THEN 'Long' WHEN f.length > 60 THEN 'Medium' ELSE 'Short' END FROM film f JOIN language l ON f.language_id = l.language_id",
      "SELECT f.title, l.name, CASE f.length WHEN 120 THEN 'Long' WHEN 60 THEN 'Medium' ELSE 'Short' END FROM film f JOIN language l ON f.language_id = l.language_id",
      "SELECT f.title, l.name, IF(f.length > 120, 'Long', 'Short') FROM film f JOIN language l ON f.language_id = l.language_id",
      "SELECT f.title, l.name FROM film f JOIN language l ON f.language_id = l.language_id WHERE f.length > 120"
    ],
    correct:0,
    explain:'שימוש נכון ב-<strong>CASE WHEN</strong> לטווחים (> 120, > 60) וחיבור לטבלת השפות דרך language_id.'
  },
  {
    num:2, diff:'easy', topic:'CASE WHEN',
    text:"כיצד נציג את שם הלקוח ואת שם הסניף ('Downtown' לסניף 1, 'Uptown' לסניף 2)?",
    options:[
      "SELECT first_name, store_id, CASE WHEN store_id = 1 THEN 'Downtown' ELSE 'Uptown' END FROM customer",
      "SELECT first_name, store_id, DECODE(store_id, 1, 'Downtown', 2, 'Uptown') FROM customer",
      "SELECT first_name, store_id, IF store_id = 1 THEN 'Downtown' FROM customer",
      "SELECT first_name, store_id, SWITCH store_id CASE 1: 'Downtown' FROM customer"
    ],
    correct:0,
    explain:'מבנה <strong>CASE WHEN</strong> תקני ב-MySQL. DECODE שייך ל-Oracle, ו-IF/SWITCH אינם תחביר חוקי בצורה זו.'
  },
  {
    num:3, diff:'easy', topic:'IS NULL',
    text:'איך נזהה סרטים שטרם הוחזרו (שבהם return_date הוא ריק)?',
    options:[
      "SELECT rental_id, CASE WHEN return_date = 0 THEN 'Still Out' ELSE 'Returned' END FROM rental",
      "SELECT rental_id, CASE WHEN return_date IS NULL THEN 'Still Out' ELSE 'Returned' END FROM rental",
      "SELECT rental_id, CASE WHEN return_date = '' THEN 'Still Out' ELSE 'Returned' END FROM rental",
      "SELECT rental_id, IFNULL(return_date, 'Still Out') FROM rental"
    ],
    correct:1,
    explain:'בדיקה נכונה של ערכי <strong>NULL</strong> מתבצעת תמיד עם <strong>IS NULL</strong> ולא עם = 0 או = רווח.'
  },
  {
    num:4, diff:'easy', topic:'CASE WHEN',
    text:"איזו שאילתה תסווג מחיר מתחת ל-2 כ-'Budget' ומעל 4 כ-'Premium'?",
    options:[
      "SELECT title, CASE WHEN rental_rate < 2 THEN 'Budget' WHEN rental_rate > 4 THEN 'Premium' ELSE 'Standard' END FROM film",
      "SELECT title, CASE rental_rate WHEN 0.99 THEN 'Budget' WHEN 4.99 THEN 'Premium' END FROM film",
      "SELECT title, CASE WHEN rental_rate < 2 THEN Budget ELSE Premium END FROM film",
      "SELECT title, rental_rate WHERE rental_rate < 2 AS Budget FROM film"
    ],
    correct:0,
    explain:'שימוש נכון בסימני השוואה (< >) ומחרוזות בגרשיים בתוך ה-CASE. ב-תשובה 3 חסרים גרשיים סביב Budget/Premium.'
  },
  {
    num:5, diff:'easy', topic:'JOIN משולש',
    text:"איזו שאילתה מחברת בין לקוח לעיר שלו ומציגה 'Active' אם הערך ב-active הוא 1?",
    options:[
      "SELECT c.first_name, ci.city, CASE WHEN c.active = 1 THEN 'Active' ELSE 'Inactive' END FROM customer c JOIN address a ON c.address_id = a.address_id JOIN city ci ON a.city_id = ci.city_id",
      "SELECT c.first_name, ci.city, IF(c.active, 'Active', 'Inactive') FROM customer c JOIN city ci ON c.city_id = ci.city_id",
      "SELECT c.first_name, ci.city, CASE c.active WHEN 1 THEN Active ELSE Inactive END FROM customer c JOIN address a ON c.address_id = a.address_id",
      "SELECT c.first_name, ci.city FROM customer c, city ci WHERE c.active = 1"
    ],
    correct:0,
    explain:'דורש <strong>JOIN משולש</strong>: לקוח → כתובת → עיר. אין קשר ישיר בין customer לבין city.'
  },
  {
    num:6, diff:'medium', topic:'GROUP BY + CASE',
    text:"איזו שאילתה תציג שם עובד, סך הכנסות וסיווג 'Top Performer' מעל 35,000?",
    options:[
      "SELECT s.first_name, SUM(p.amount), CASE WHEN SUM(p.amount) > 35000 THEN 'Top Performer' ELSE 'Standard' END FROM staff s JOIN payment p ON s.staff_id = p.staff_id GROUP BY s.staff_id",
      "SELECT s.first_name, p.amount, CASE WHEN p.amount > 35000 THEN 'Top Performer' END FROM staff s JOIN payment p ON s.staff_id = p.staff_id",
      "SELECT s.first_name, SUM(p.amount) FROM staff s JOIN payment p ON s.staff_id = p.staff_id HAVING SUM(p.amount) > 35000",
      "SELECT s.first_name, SUM(p.amount) AS total FROM staff s JOIN payment p ON s.staff_id = p.staff_id WHERE total > 35000 GROUP BY s.first_name"
    ],
    correct:0,
    explain:'חובה להשתמש ב-<strong>GROUP BY</strong> כדי שה-SUM יחושב לכל עובד בנפרד. ב-תשובה 4 לא ניתן להשתמש ב-Alias בתוך WHERE.'
  },
  {
    num:7, diff:'medium', topic:'COUNT + CASE',
    text:"איך נסווג קטגוריות עם יותר מ-70 סרטים כ-'Popular'?",
    options:[
      "SELECT c.name, COUNT(fc.film_id), CASE WHEN COUNT(fc.film_id) > 70 THEN 'Popular' ELSE 'Niche' END FROM category c JOIN film_category fc ON c.category_id = fc.category_id GROUP BY c.name",
      "SELECT c.name, COUNT(fc.film_id) FROM category c JOIN film_category fc ON c.category_id = fc.category_id WHERE COUNT(fc.film_id) > 70",
      "SELECT c.name, CASE WHEN film_id > 70 THEN 'Popular' END FROM category",
      "SELECT c.name, COUNT(fc.film_id) AS total FROM category c JOIN film_category fc ON c.category_id = fc.category_id GROUP BY c.name HAVING total > 70"
    ],
    correct:0,
    explain:'שימוש ב-<strong>COUNT בתוך CASE</strong> עם GROUP BY. ב-תשובה 2 לא ניתן להשתמש ב-COUNT בתוך WHERE.'
  },
  {
    num:8, diff:'medium', topic:'LEFT JOIN',
    text:"איזו שאילתה תציג 'Out of Stock' אם אין עותקים לסרט בסניף מסוים?",
    options:[
      "SELECT f.title, i.store_id, CASE WHEN COUNT(i.inventory_id) = 0 THEN 'Out of Stock' ELSE 'In Stock' END FROM film f LEFT JOIN inventory i ON f.film_id = i.film_id GROUP BY f.title, i.store_id",
      "SELECT f.title, i.store_id, CASE WHEN i.inventory_id IS NULL THEN 'Out of Stock' END FROM film f JOIN inventory i ON f.film_id = i.film_id",
      "SELECT f.title, COUNT(i.inventory_id) FROM film f JOIN inventory i ON f.film_id = i.film_id WHERE i.inventory_id = 0",
      "SELECT f.title, IF(COUNT(inventory_id) > 0, 'In Stock', 'Out of Stock') FROM film f INNER JOIN inventory i ON f.film_id = i.film_id"
    ],
    correct:0,
    explain:'<strong>LEFT JOIN</strong> קריטי כדי לראות סרטים עם 0 עותקים. עם INNER JOIN, סרטים ללא מלאי לא יופיעו בכלל.'
  },
  {
    num:9, diff:'medium', topic:'CASE ערכים קבועים',
    text:"איך נמיר את הקוד 'R' למילים 'Restricted'?",
    options:[
      "SELECT title, CASE rating WHEN 'R' THEN 'Restricted' WHEN 'G' THEN 'General' ELSE 'Other' END FROM film",
      "SELECT title, IF(rating = 'R', 'Restricted', 'Other') FROM film",
      "SELECT title, rating AS Restricted FROM film WHERE rating = 'R'",
      "SELECT title, REPLACE(rating, 'R', 'Restricted') FROM film"
    ],
    correct:0,
    explain:'זו הצורה הפשוטה של <strong>CASE</strong> להחלפת ערכים קבועים — CASE עמודה WHEN ערך THEN תוצאה.'
  },
  {
    num:10, diff:'medium', topic:'JOIN ארבע טבלאות',
    text:"איזו שאילתה תסווג לקוחות מארה\"ב וקנדה כ-'North America'?",
    options:[
      "SELECT c.first_name, co.country, CASE WHEN co.country IN ('United States', 'Canada') THEN 'North America' ELSE 'Other' END FROM customer c JOIN address a ON c.address_id = a.address_id JOIN city ci ON a.city_id = ci.city_id JOIN country co ON ci.country_id = co.country_id",

let answers = {};
let correct = 0;
let answered = 0;

function updateScore(){
  const total = Object.keys(answers).length;
  const pct = total > 0 ? Math.round(correct/total*100) : 0;
  document.getElementById('scoreText').textContent = correct+' / '+total;
  document.getElementById('scoreFill').style.width = pct+'%';
  document.getElementById('scorePct').textContent = pct+'%';
  document.getElementById('heroAnswered').textContent = total;
  if(total === questions.length) showFinish();
}

function selectOption(qIdx, optIdx){
  if(answers[qIdx] !== undefined) return;
  const q = questions[qIdx];
  const isCorrect = optIdx === q.correct;
  answers[qIdx] = optIdx;
  if(isCorrect) correct++;
  answered++;

  // Style card
  const card = document.getElementById('qcard-'+qIdx);
  card.classList.add(isCorrect ? 'correct' : 'wrong');

  // Style options
  const opts = card.querySelectorAll('.option');
  opts.forEach((o,i)=>{
    o.classList.add('disabled');
    if(i === q.correct) o.classList.add('correct-ans');
    if(i === optIdx && !isCorrect) o.classList.add('wrong-ans');
  });

  // Show explanation
  document.getElementById('exp-'+qIdx).classList.add('show');
  updateScore();
}

  questions.forEach((q,i)=>{
    if(q.diff !== lastDiff){
      mc.innerHTML += `<div class="section-label ${sectionClass[q.diff]}">${sectionTitle[q.diff]}</div>`;
      lastDiff = q.diff;
    }
    const letters = ['א','ב','ג','ד'];
    let optsHtml = q.options.map((o,oi)=>`
      <div class="option" onclick="selectOption(${i},${oi})">
        <div class="opt-letter">${letters[oi]}</div>
        <div class="opt-text">${o}</div>
      </div>`).join('');

    mc.innerHTML += `
    <div class="q-card" id="qcard-${i}">
      <div class="q-header">
        <div class="q-meta">
          <div class="q-num">שאלה ${q.num}</div>
          <div class="q-diff ${diffClass[q.diff]}">${diffLabel[q.diff]}</div>
          <div class="q-topic">${q.topic}</div>
        </div>
        <div class="q-text">${q.text}</div>
      </div>
      <div class="q-body">
        <div class="options">${optsHtml}</div>
        <div class="explanation" id="exp-${i}">
          <p>${q.correct === answers[i] ? '✅' : '❌'} <strong>${q.correct === answers[i] ? 'נכון!' : 'לא נכון.'}</strong> ${q.explain}</p>
        </div>
      </div>
    </div>`;
  });

  mc.innerHTML += `
  <div class="finish-card" id="finishCard">
    <div class="finish-emoji">🎉</div>
    <div class="finish-title">סיימת את הקוויז!</div>
    <div class="finish-score" id="finishScore">0/15</div>
    <div id="finishGrade"></div>
    <div class="finish-sub" id="finishSub"></div>
    <br>
    <button class="retry-btn" onclick="resetQuiz()">🔄 נסה שוב</button>
  </div>`;
}

function showFinish(){
  const card = document.getElementById('finishCard');
  card.classList.add('show');
  card.scrollIntoView({behavior:'smooth',block:'center'});
  document.getElementById('finishScore').textContent = correct+'/'+questions.length;
  const pct = Math.round(correct/questions.length*100);
  let grade, sub;
  if(pct>=90){grade='<span class="finish-grade grade-a">⭐ מצוין! A</span>';sub='ביצועים יוצאי דופן — אתה שולט ב-SQL ברמה גבוהה!';}
  else if(pct>=75){grade='<span class="finish-grade grade-b">👍 טוב מאוד! B</span>';sub='עבודה טובה! כדאי לחזור על הנושאים שטעית בהם.';}
  else if(pct>=60){grade='<span class="finish-grade grade-c">📚 עובר! C</span>';sub='בסיס טוב, אבל יש מקום לשיפור. חזור על החומר.';}
  else{grade='<span class="finish-grade grade-d">💪 ממשיכים להתאמן! D</span>';sub='אל תתייאש — חזור לחומר הלימוד ונסה שוב!';}
  document.getElementById('finishGrade').innerHTML = grade;
  document.getElementById('finishSub').textContent = sub;
}

function resetQuiz(){
  answers = {}; correct = 0; answered = 0;
  document.getElementById('mainContent').innerHTML = '';
  buildQuiz();
  updateScore();
  window.scrollTo({top:0,behavior:'smooth'});
}

function toggleMenu(){
  document.getElementById('hamburger').classList.toggle('open');
  document.getElementById('mobileMenu').classList.toggle('open');
}

buildQuiz();
updateScore();
</script>
</body>
</html>
